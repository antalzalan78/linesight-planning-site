<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found - Zalan Antal Planning</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="/linesight-planning-site/favicon.svg">
<style>
  :root{
    --navy:#0f2438;
    --navy-2:#16324c;
    --teal:#1fa38c;
    --teal-dark:#157a69;
    --amber:#f0a848;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(160deg,var(--navy) 0%,var(--navy-2) 60%,#1b4059 100%);
    color:#fff;text-align:center;padding:24px;
  }
  .box{max-width:440px}
  .bars{display:flex;align-items:flex-end;gap:8px;justify-content:center;margin-bottom:28px}
  .bars span{width:16px;border-radius:5px;display:block}
  .bars span:nth-child(1){height:34px;background:var(--teal)}
  .bars span:nth-child(2){height:52px;background:var(--amber)}
  .bars span:nth-child(3){height:72px;background:#fff}
  h1{font-size:4.2rem;font-weight:800;line-height:1}
  h1 em{font-style:normal;color:var(--amber)}
  p{margin:16px 0 30px;color:#c9d6e2;font-size:1.05rem}
  a.btn{
    display:inline-block;padding:13px 28px;border-radius:10px;text-decoration:none;
    font-weight:600;background:var(--teal);color:#fff;
    box-shadow:0 4px 14px rgba(31,163,140,.35);transition:transform .12s,background .15s;
  }
  a.btn:hover{background:var(--teal-dark);transform:translateY(-1px)}
</style>
</head>
<body>
  <div class="box">
    <div class="bars" aria-hidden="true"><span></span><span></span><span></span></div>
    <h1>4<em>0</em>4</h1>

    <a class="btn" href="/linesight-planning-site/">Back to the homepage</a>
  </div>
</body>
</html>
